name: Build OpenWRT package (release)

on:
  push:
    tags:
      - "v*"

jobs:
  build-packages:
    strategy:
      matrix:
        include:
          - openwrt_version: '24.10'
            openwrt_build_version: '24.10.7'
            arch: 'x86_64'
          - openwrt_version: '25.12'
            openwrt_build_version: '25.12.4'
            arch: 'x86_64'
      fail-fast: false
    permissions: {}
    uses: Zerogiven/gh-openwrt-package-build-workflows/.github/workflows/reusable-build.yml@main
    with:
      package_name: 'uhttpd-mod-ws'
      sdk_packages: 'uhttpd-mod-ws'
      artifacts_patterns: |
        uhttpd-mod-ws*.ipk
        uhttpd-mod-ws*.apk
      openwrt_version: ${{ matrix.openwrt_version }}
      openwrt_build_version: ${{ matrix.openwrt_build_version }}
      arch: ${{ matrix.arch }}
      free_disk_space: false
      use_patched_build: false
      verbose: false
    secrets:
      APK_SIGN_KEY: ${{ secrets.APK_SIGN_KEY }}

  create-release:
    needs: build-packages
    permissions:
      contents: write
    uses: Zerogiven/gh-openwrt-package-build-workflows/.github/workflows/reusable-release.yml@prometheus-node-exporter-lua-patch
    with:
      artifact_pattern: 'uhttpd-mod-ws*'
      tag_name: ${{ github.ref_name }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.OWRT_PACKAGE_RELEASE_TOKEN }}

  trigger-feed-update:
    needs: create-release
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger package feed update
        env:
          GH_TOKEN: ${{ secrets.FEED_DISPATCH_TOKEN }}
        run: |
          gh api repos/Zerogiven-OpenWRT-Packages/package-feed/dispatches \
            -f event_type=webhook-release \
            -f 'client_payload[repository]=${{ github.repository }}' \
            -f 'client_payload[tag]=${{ github.ref_name }}'
